line-length = 100
target-version = "py313"

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # Pyflakes
    "I",     # isort
    "C",     # flake8-comprehensions & complexity
    "B",     # flake8-bugbear
    "UP",    # pyupgrade
    "ARG",   # flake8-unused-arguments
    "SIM",   # flake8-simplify
    # "TCH",   # flake8-type-checking
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in argument defaults (FastAPI Depends)
    "B905",  # zip without explicit strict (Python 3.10+)
    # "UP038",  # Use | instead of Union (not always compatible)
    "C901",  # function too complex (acceptable for initial implementation)
]

[lint.mccabe]
max-complexity = 10

[lint.isort]
known-third-party = ["cpaiops", "arlogi"]

[lint.per-file-ignores]
"**/tests/**/*" = ["ARG", "SIM"]
"src/fa/services/session_changes_pdf.py" = ["B023"]  # False positive: nested function modifies outer scope mutable objects

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "native"
